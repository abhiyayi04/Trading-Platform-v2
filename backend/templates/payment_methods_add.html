{% extends "base.html" %}
{% block content %}

<div class="container py-5" style="max-width: 700px;">

  <div class="auth-card shadow">

    <h4 class="mb-3" style="color: #e6e6e6;">Add Payment Method</h4>

    <form method="POST" class="row g-3">

      <div class="col-md-6">
        <label class="form-label" style="color:#e6e6e6;">Brand</label>
        <select name="brand" class="form-select form-control" required
                style="background-color:#0d1117; color:#e6e6e6; border:1px solid #30363d;">
          <option>Visa</option>
          <option>Mastercard</option>
          <option>Amex</option>
          <option>Discover</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label" style="color:#e6e6e6;">Last 4 digits</label>
        <input type="text"
               name="last4"
               maxlength="4"
               class="form-control"
               pattern="\d{4}"
               required>
      </div>

      <div class="col-md-6">
        <label class="form-label" style="color:#e6e6e6;">Exp. Month</label>
        <input type="number"
               name="exp_month"
               class="form-control"
               min="1"
               max="12"
               required>
      </div>

      <div class="col-md-6">
        <label class="form-label" style="color:#e6e6e6;">Exp. Year</label>
        <input type="number"
               name="exp_year"
               class="form-control"
               min="2025"
               required>
      </div>

      <div class="col-12 form-check mt-2">
        <input class="form-check-input" type="checkbox" name="is_default" id="is_default" checked>
        <label class="form-check-label" for="is_default" style="color:#e6e6e6;">
          Set as default
        </label>
      </div>

      <div class="col-12 mt-3">
        <button class="btn btn-primary px-4">Save Method</button>
        <a class="btn btn-link" href="{{ url_for('funds') }}" style="color:#58a6ff;">Back to Funds</a>
      </div>

    </form>
  </div>

</div>

{% endblock %}
