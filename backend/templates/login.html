{% extends "base.html" %}
{% block content %}

<div class="login-container">

    <div class="left-section">
        <img src="{{ url_for('static', filename='img/logo.png') }}" class="caption-logo">

        <h1>Trade Smarter</h1>
        <p>Simple. Fast. Reliable — your gateway to smart investing.</p>
    </div>

    <div class="right-section">
        <div class="auth-card shadow-sm">
            <div class="auth-header">Login</div>

            <form method="POST">
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" name="email" required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <div class="mt-3 text-center">
                <a href="{{ url_for('register') }}" class="text-decoration-none">Don't have an account? Register</a><br>
            </div>
        </div>
    </div>

</div>

{% endblock %}
