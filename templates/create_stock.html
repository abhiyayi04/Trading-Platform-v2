{% extends "base.html" %}
{% block content %}

<div class="container py-4">

  <div class="card shadow-sm" 
       style="background-color:#161b22; border:1px solid #30363d; border-radius:12px;">

    <div class="card-header"
         style="background-color:#0b0f16; color:#e6e6e6; border-bottom:1px solid #30363d;">
      <h5 class="mb-0">Create New Stock</h5>
    </div>

    <div class="card-body">

      <form method="POST">

        <div class="mb-3">
          <label class="form-label" style="color:#e6e6e6;">Company Name</label>
          <input type="text" name="company_name" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label" style="color:#e6e6e6;">Stock Ticker (Symbol)</label>
          <input type="text" name="symbol" class="form-control text-uppercase" maxlength="10" required>
        </div>

        <div class="mb-3">
          <label class="form-label" style="color:#e6e6e6;">Initial Price ($)</label>
          <input type="number" name="price" min="0.01" step="0.01" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label" style="color:#e6e6e6;">Total Volume (Shares)</label>
          <input type="number" name="volume" min="1" step="any" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Add Stock</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>

      </form>

    </div>

  </div>

</div>

{% endblock %}
